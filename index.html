<script type="text/babel" data-presets="react" data-source="packaging.jsx">
/* === inlined from packaging.jsx === */
// NORR Energy Gum — Packaging Design System
// Arctic Mint launch SKU
// Pack sleeve: 90×135mm | Display box: 240×140×90mm
//
// Source: claude.ai design session (recovered 2026-04-30).
// This file is the PRIMITIVES layer — tokens, dieline metrics, and shared
// components. The assembled pack faces (front / back / sides / display box)
// are not in this file.

// ─────────────────────────────────────────────────────────
// METRICS — print-real at 1mm = MM px
// ─────────────────────────────────────────────────────────
const MM = 3.7795275591; // 1mm @ 96dpi CSS pixels
const mm = (n) => `${n * MM}px`;

// Pack sleeve (single carton) — 90w × 135h
const PACK = { w: 90, h: 135, d: 20 }; // depth assumed for a tuck-end sleeve
// Display box — 240w × 140h × 90d (from dieline)
const BOX = { w: 240, h: 140, d: 90 };

// ─────────────────────────────────────────────────────────
// TOKENS
// ─────────────────────────────────────────────────────────
const norr = {
  ice:    '#F2F3F0',   // off-white base
  iceDim: '#E6E8E4',   // panel tint
  ink:    '#0B0E10',   // near-black
  muted:  '#5A6268',   // secondary text
  line:   '#C9CDC7',   // hairlines
  mint:   '#338DB8',   // NORR brand blue (matches reference pouch)
  mintDk: '#1F6F95',
  mintLt: '#7FB7D4',
  mintTint:'#CFE3EE',
  // dieline inks
  cut:    '#E34A3F',
  fold:   '#3862D4',
  perf:   '#C08C2B',
  safe:   'rgba(14,170,120,0.55)',
  bleed:  'rgba(227,74,63,0.25)',
};

const F_DISP = '"Inter Tight", "Helvetica Neue", Helvetica, Arial, sans-serif';
const F_MONO = '"JetBrains Mono", "SF Mono", ui-monospace, Menlo, monospace';

// ─────────────────────────────────────────────────────────
// SHARED PRIMITIVES
// ─────────────────────────────────────────────────────────
function Wordmark({ size = 72, color = norr.ink, tracking = '-0.04em' }) {
  // Editorial, wide-weight wordmark. Small notch on the R counter gives character.
  return (
    <span style={{
      fontFamily: F_DISP, fontWeight: 800, fontSize: size,
      letterSpacing: tracking, lineHeight: 0.9, color,
      display: 'inline-block', fontStretch: '110%',
    }}>NORR</span>
  );
}

function MonoLabel({ children, size = 8, color = norr.muted, tracking = '0.18em', weight = 500, style }) {
  return (
    <span style={{
      fontFamily: F_MONO, fontSize: size, fontWeight: weight,
      letterSpacing: tracking, color, textTransform: 'uppercase',
      ...style,
    }}>{children}</span>
  );
}

function Hairline({ color = norr.line, thickness = 0.5, vertical = false, style }) {
  return (
    <div style={{
      background: color,
      width: vertical ? thickness : '100%',
      height: vertical ? '100%' : thickness,
      ...style,
    }} />
  );
}

// Crosshair / registration mark
function Crosshair({ size = 10, color = norr.ink, style }) {
  const s = size;
  return (
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} style={{ display:'block', ...style }}>
      <circle cx={s/2} cy={s/2} r={s/2-1} fill="none" stroke={color} strokeWidth="0.4" />
      <line x1="0" y1={s/2} x2={s} y2={s/2} stroke={color} strokeWidth="0.4" />
      <line x1={s/2} y1="0" x2={s/2} y2={s} stroke={color} strokeWidth="0.4" />
    </svg>
  );
}

// Corner tick marks used on panels
function CornerTicks({ inset = 6, len = 5, color = norr.ink, thickness = 0.4 }) {
  const t = thickness;
  const L = len;
  const i = inset;
  const corner = (top, left) => (
    <>
      <div style={{
        position: 'absolute',
        [top ? 'top' : 'bottom']: i,
        [left ? 'left' : 'right']: i,
        width: L, height: t, background: color,
      }} />
      <div style={{
        position: 'absolute',
        [top ? 'top' : 'bottom']: i,
        [left ? 'left' : 'right']: i,
        width: t, height: L, background: color,
      }} />
    </>
  );
  return <>{corner(true,true)}{corner(true,false)}{corner(false,true)}{corner(false,false)}</>;
}

// Small topographic / contour pattern — subtle glacier hint
function ContourBg({ opacity = 0.08, stroke = norr.ink }) {
  // generate a few nested curved paths
  const paths = [];
  for (let i = 0; i < 7; i++) {
    const y = 20 + i * 14;
    const d = `M -10 ${y} C 40 ${y - 8}, 80 ${y + 10}, 130 ${y - 4} S 240 ${y + 6}, 310 ${y - 2}`;
    paths.push(<path key={i} d={d} fill="none" stroke={stroke} strokeWidth="0.3" opacity={1 - i*0.08} />);
  }
  return (
    <svg viewBox="0 0 300 200" preserveAspectRatio="none"
      style={{ position:'absolute', inset:0, width:'100%', height:'100%', opacity, pointerEvents:'none' }}>
      {paths}
    </svg>
  );
}

// Rune-ish NORR seal glyph (geometric, non-copyrighted)
function NorrSeal({ size = 40, color = norr.ink, fill = 'none' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" style={{ display:'block' }}>
      <circle cx="20" cy="20" r="19" fill={fill} stroke={color} strokeWidth="0.6" />
      <circle cx="20" cy="20" r="13" fill="none" stroke={color} strokeWidth="0.4" />
      <path d="M 14 12 L 14 28 M 14 12 L 26 28 M 26 12 L 26 28"
        fill="none" stroke={color} strokeWidth="1.1" strokeLinecap="square" />
      <text x="20" y="37" textAnchor="middle" fontFamily={F_MONO} fontSize="3" letterSpacing="0.25em" fill={color}>
        NORDIC ENERGY
      </text>
    </svg>
  );
}

// Mountain + lightning bolt icon — REAL brand logo (vectorized).
// Paths sourced from logo.svg (435×345 viewBox); rendered in any single brand color.
function MountainBolt({ size = 60, color = norr.ice, accent = norr.ice }) {
  return (
    <svg width={size} height={size * (345/435)} viewBox="0 0 435 345" style={{ display:'block' }}>
      {/* Mountain outline */}
      <path
        fill={color}
        d="M 411 217 L 331 130 L 306 138 L 221 29 L 152 118 L 116 118 L 28 218 L 60 218 L 128 141 L 167 141 L 221 72 L 298 169 L 324 158 L 380 218 Z"
      />
      {/* Lightning bolt */}
      <path
        fill={accent}
        d="M 241 134 L 199 181 L 152 237 L 201 238 L 203 240 L 178 317 L 276 207 L 234 208 L 219 206 Z"
      />
    </svg>
  );
}

// Big sans caffeine stat
function StatBlock({ value, unit, label, color = norr.ink, align = 'left' }) {
  return (
    <div style={{ textAlign: align, color, lineHeight: 0.9 }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 2, justifyContent: align === 'left' ? 'flex-start' : 'center' }}>
        <span style={{ fontFamily: F_DISP, fontWeight: 700, fontSize: 44, letterSpacing: '-0.04em' }}>{value}</span>
        <span style={{ fontFamily: F_DISP, fontWeight: 500, fontSize: 14 }}>{unit}</span>
      </div>
      <div style={{ marginTop: 4 }}>
        <MonoLabel size={7} color={color}>{label}</MonoLabel>
      </div>
    </div>
  );
}

// Small ingredient table for the back
function NutritionTable({ compact = false, onBlue = false }) {
  // Per 100 g values for sugar-free chewing gum (1.8 g / piece, 50 mg caffeine / piece, 10 μg B12 / piece)
  // 50 mg × (100 / 1.8) ≈ 2778 mg → 2.78 g caffeine / 100 g
  // 10 μg × (100 / 1.8) ≈ 556 μg B12 / 100 g  → 22 240 % NRV
  const rows = [
    ['Orka / Energy', '697 kJ / 165 kcal'],
    ['Fita / Fat', '0,5 g'],
    ['— þar af mettuð / of which saturates', '0 g'],
    ['Kolvetni / Carbohydrates', '63 g'],
    ['— þar af sykurtegundir / of which sugars', '0 g'],
    ['— þar af fjölalkóhól / polyols', '60 g'],
    ['Prótein / Protein', '0 g'],
    ['Salt', '0 g'],
    ['Koffín / Caffeine', '2 778 mg'],
    ['B12-vítamín / Vitamin B12', '556 μg (22 240 % NRV)'],
  ];
  const fg = onBlue ? norr.ice : norr.ink;
  const muted = onBlue ? norr.mintLt : norr.muted;
  const line = onBlue ? 'rgba(255,255,255,0.35)' : norr.line;
  const heavy = onBlue ? norr.ice : norr.ink;
  // EU FIC Annex IV: mandatory info needs x-height ≥ 1.2 mm — sized in print-real mm.
  const fs = compact ? 2.2 * MM : 2.6 * MM;
  const hs = compact ? 1.9 * MM : 2.2 * MM;
  const padY = compact ? '0.5mm' : '0.8mm';
  return (
    <table style={{
      width: '100%', borderCollapse: 'collapse',
      fontFamily: F_MONO, fontSize: fs, color: fg, lineHeight: 1.25,
    }}>
      <thead>
        <tr style={{ borderBottom: `0.6px solid ${heavy}` }}>
          <th style={{ textAlign:'left', padding: `${padY} 0`, fontSize: hs, fontWeight: 700, letterSpacing:'0.14em', textTransform:'uppercase', color: heavy }}>
            Næringargildi / Nutrition
          </th>
          <th style={{ textAlign:'right', padding: `${padY} 0`, fontSize: hs, fontWeight: 500, color: muted, letterSpacing:'0.14em', textTransform:'uppercase' }}>
            í 100 g / per 100 g
          </th>
        </tr>
      </thead>
      <tbody>
        {rows.map(([a,b],i) => (
          <tr key={i} style={{ borderBottom: `0.2px solid ${line}` }}>
            <td style={{ padding: `${padY} 0` }}>{a}</td>
            <td style={{ padding: `${padY} 0`, textAlign: 'right' }}>{b}</td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

// Real EAN-13 barcode for 5694080022721 — laid out to match supplied reference image:
// leading "5" sits left of the bars at baseline; "694080" centered under left half;
// "022721" centered under right half; bars descend to the digit baseline at the guards.
function Barcode({ width = 100, height = 67, code = '5694080022721' }) {
  const L = ['0001101','0011001','0010011','0111101','0100011','0110001','0101111','0111011','0110111','0001011'];
  const G = ['0100111','0110011','0011011','0100001','0011101','0111001','0000101','0010001','0001001','0010111'];
  const R = ['1110010','1100110','1101100','1000010','1011100','1001110','1010000','1000100','1001000','1110100'];
  const PARITY = ['LLLLLL','LLGLGG','LLGGLG','LLGGGL','LGLLGG','LGGLLG','LGGGLL','LGLGLG','LGLGGL','LGGLGL'];
  const digits = code.replace(/\D/g,'').padStart(13,'0').slice(-13).split('').map(Number);
  const parity = PARITY[digits[0]];
  let bits = '101';
  for (let i = 1; i <= 6; i++) bits += (parity[i-1] === 'L' ? L : G)[digits[i]];
  bits += '01010';
  for (let i = 7; i <= 12; i++) bits += R[digits[i]];
  bits += '101';

  // Bars rendered in SVG, digit row rendered in HTML beneath.
  // HTML digit row is far more reliable than SVG <text> across browsers,
  // print-to-PDF, and screenshot tools.
  const BARS_X = 5;
  const BARS_TOP = 0;
  const BARS_BTM = 56;
  const GUARD_BTM = 60;
  const VIEWBOX_H = 62;        // SVG only contains the bars
  const guardCols = new Set([0,1,2,45,46,47,48,49,92,93,94]);

  const bars = [];
  for (let i = 0; i < bits.length; i++) {
    if (bits[i] === '1') {
      const x = BARS_X + i;
      const y2 = guardCols.has(i) ? GUARD_BTM : BARS_BTM;
      bars.push(<rect key={i} x={x} y={BARS_TOP} width="1.05" height={y2 - BARS_TOP} fill={norr.ink} />);
    }
  }

  const leftDigits = digits.slice(1,7).join('');
  const rightDigits = digits.slice(7,13).join('');

  // Allocate height between bars (75%) and digit row (25%) so digits are
  // clearly readable at any rendered size.
  const barsH = height * 0.75;
  const digitH = height * 0.25;
  const digitFontPx = digitH * 0.78;
  const leadingW = (BARS_X / 100) * width;
  const halfW = ((100 - BARS_X * 2) / 2 / 100) * width;

  return (
    <div style={{
      display: 'inline-block',
      background: '#fff',
      lineHeight: 1,
      fontFamily: F_MONO, fontWeight: 600, color: norr.ink,
    }}>
      <svg width={width} height={barsH} viewBox={`0 0 100 ${VIEWBOX_H}`} preserveAspectRatio="none"
        style={{ display:'block', background:'#fff' }}>
        {bars}
      </svg>
      <div style={{
        width, height: digitH,
        display: 'grid',
        gridTemplateColumns: `${leadingW}px ${halfW}px ${halfW}px ${leadingW}px`,
        alignItems: 'center',
        fontSize: digitFontPx,
        letterSpacing: '0.18em',
      }}>
        <span style={{ textAlign:'left', paddingLeft: 1 }}>{digits[0]}</span>
        <span style={{ textAlign:'center' }}>{leftDigits}</span>
        <span style={{ textAlign:'center' }}>{rightDigits}</span>
        <span />
      </div>
    </div>
  );
}

Object.assign(window, {
  MM, mm, PACK, BOX, norr, F_DISP, F_MONO,
  Wordmark, MonoLabel, Hairline, Crosshair, CornerTicks, ContourBg, NorrSeal, MountainBolt,
  StatBlock, NutritionTable, Barcode,
});

</script>
<script type="text/babel" data-presets="react" data-source="panels.jsx">
/* === inlined from panels.jsx === */
// NORR — Pack = flexible stand-up pouch (tear-notch + press-reseal)

const POUCH = { topSeal: 10, btmSeal: 8, sideSeal: 4, notchAt: 24 };

function TearNotch({ side = 'left' }) {
  const flip = side === 'right';
  return (
    <svg width={mm(3)} height={mm(4)} viewBox="0 0 12 16" style={{
      display:'block', transform: flip ? 'scaleX(-1)' : 'none',
    }}>
      <polygon points="0,0 8,4 0,8" fill={norr.mintDk} />
    </svg>
  );
}

// ─────────────────────────────────────────────────────────
// PACK FRONT — Hero brand stack on a single brand-blue field.
// Compliance:
//   • "with sweeteners" qualifier in IS+EN, adjacent to product category (Annex III §2.4)
//   • Net quantity figures ≥ 2 mm character height per Dir. 76/211/EEC (≤ 50 g pack)
//   • Icelandic descriptive name on principal display panel (Iceland Reg. 1294/2014)
//   • No unsubstantiated implied health claims (no "clean", no "fast-acting")
// ─────────────────────────────────────────────────────────
function PackFront({ showSafe, showDieline }) {
  const W = PACK.w, H = PACK.h;
  const topSeal = POUCH.topSeal, btmSeal = POUCH.btmSeal, sideSeal = POUCH.sideSeal;
  const PAD = 8; // mm — left/right padding on the printed face

  return (
    <div style={{
      position: 'relative', width: mm(W), height: mm(H),
      background: norr.mint, color: norr.ice, overflow: 'hidden', boxSizing: 'border-box',
    }}>
      {/* Header crimp seal */}
      <div style={{
        position:'absolute', top: 0, left: 0, right: 0, height: mm(topSeal),
        background: norr.mint,
      }} />

      {/* Tear notches */}
      <div style={{ position:'absolute', top: mm(topSeal - 1.5), left: 0 }}><TearNotch side="left" /></div>
      <div style={{ position:'absolute', top: mm(topSeal - 1.5), right: 0 }}><TearNotch side="right" /></div>

      {/* Side seals */}
      <div style={{ position:'absolute', top: 0, bottom: 0, left: 0, width: mm(sideSeal),
        background: `linear-gradient(90deg, ${norr.mintDk} 0%, transparent 100%)`, opacity: 0.4 }} />

<script type="text/babel" data-presets="react" data-source="layouts.jsx">
/* === inlined from layouts.jsx === */
// NORR — Flat dielines and mockup scenes

function DielineLegend({ showDieline, onToggle }) {

        marginLeft: 8,

// ─────────────────────────────────────────────────
// POUCH FLAT — front + back, side by side, with labels
// ─────────────────────────────────────────────────
function PackFlat({ showDieline, showSafe }) {
  const gap = 12; // mm visual gap
  return (
    <div style={{ position:'relative', display:'flex', gap: mm(gap), alignItems:'flex-start' }}>

      </div>
      <div style={{ position:'relative' }}>

          BACK FACE · 90 × 135 mm
        </div>
        <PackBack showDieline={showDieline} showSafe={showSafe} />
      </div>

}

// ─────────────────────────────────────────────────
// BOX FLAT — unchanged reverse-tuck carton
// ─────────────────────────────────────────────────
function BoxFlat({ showDieline, showSafe }) {
  const glueW = 12;
  const w = BOX.d + BOX.w + BOX.d + BOX.w + glueW;
  const h = BOX.h + BOX.d*2;

  return (
    <div style={{ position:'relative', width: mm(w), height: mm(h) }}>
      <div style={{ position:'absolute', top: 0, left: 0, display:'flex' }}>
        <div style={{ width: mm(BOX.d), height: mm(BOX.d) }} />
        <div style={{ width: mm(BOX.w), height: mm(BOX.d),
          borderBottom: showDieline ? `1.2px dashed ${norr.fold}` : 'none' }}>
          <BoxTop showSafe={showSafe} />
        </div>
        <div style={{ width: mm(BOX.d), height: mm(BOX.d) }} />
        <div style={{ width: mm(BOX.w), height: mm(BOX.d), background: norr.ice,
          borderBottom: showDieline ? `1.2px dashed ${norr.fold}` : 'none',
          display:'flex', alignItems:'center', justifyContent:'center' }}>
          <MonoLabel size={6} tracking="0.3em" color={norr.muted}>TOP DUST FLAP</MonoLabel>
        </div>
        <div style={{ width: mm(glueW), height: mm(BOX.d) }} />

      <div style={{ position:'absolute', top: mm(BOX.d), left: 0, display:'flex' }}>
        <div style={{ borderRight: showDieline ? `1.2px dashed ${norr.fold}` : 'none' }}><BoxSideShort showSafe={showSafe} /></div>
        <div style={{ borderRight: showDieline ? `1.2px dashed ${norr.fold}` : 'none' }}><BoxFront showSafe={showSafe} /></div>

        <div style={{
          width: mm(glueW), height: mm(BOX.h),
          background: `repeating-linear-gradient(-45deg, ${norr.iceDim} 0, ${norr.iceDim} 3px, ${norr.ice} 3px, ${norr.ice} 7px)`,

      <div style={{ position:'absolute', top: mm(BOX.d + BOX.h), left: 0, display:'flex' }}>

        <div style={{ width: mm(BOX.w), height: mm(BOX.d), background: norr.ice,

          <MonoLabel size={6} tracking="0.3em" color={norr.muted}>BOTTOM DUST FLAP</MonoLabel>
        </div>
        <div style={{ width: mm(glueW), height: mm(BOX.d) }} />
      </div>

      {showDieline && <BoxCutOutline w={w} h={h} />}
    </div>

}

function BoxCutOutline({ w, h }) {
  const D = BOX.d, W = BOX.w, H = BOX.h, g = 12;
  const pts = [
    [D,0],[D+W,0],[D+W,D],[2*D+W,D],[2*D+W,0],[2*D+2*W,0],[2*D+2*W,D],
    [2*D+2*W+g,D],[2*D+2*W+g,D+H],[2*D+2*W,D+H],[2*D+2*W,2*D+H],
    [2*D+W,2*D+H],[2*D+W,D+H],[D+W,D+H],[D+W,2*D+H],[D,2*D+H],
    [D,D+H],[0,D+H],[0,D],[D,D],
  ];
  const toMM = (a) => a.map(p => `${p[0]*MM},${p[1]*MM}`).join(' ');
  return (
    <svg style={{ position:'absolute', inset:0, pointerEvents:'none' }} width={w*MM} height={h*MM}>
      <polygon points={toMM(pts)} fill="none" stroke={norr.cut} strokeWidth="1.4" />
      <line x1={(D+6)*MM} y1={(D/2)*MM} x2={(D+W-6)*MM} y2={(D/2)*MM}
        stroke={norr.perf} strokeWidth="1" strokeDasharray="3 2" />
    </svg>
  );
}

        overflow:'hidden',

        <PackFront />
        {/* pillow lighting — soft highlight down the center + shadows on the sides */}
        <div style={{
          position:'absolute', inset:0, pointerEvents:'none',

            radial-gradient(ellipse 60% 90% at 50% 55%, rgba(255,255,255,0.12), transparent 70%),

        <div style={{ position:'absolute', bottom:0, left:0, right:0, height: mm(POUCH.btmSeal),
          background: 'linear-gradient(0deg, rgba(0,0,0,0.25), transparent)', pointerEvents:'none' }} />
      </div>
    </div>
  );
}

// OPENED pouch mockup — torn header flap
function PackOpenedMockup({ scale = 1.4 }) {
  const W = PACK.w, H = PACK.h;
  return (
    <div style={{
      position:'relative', width: W*MM*scale + 60, height: H*MM*scale + 60,
      display:'flex', alignItems:'center', justifyContent:'center',
    }}>
      <div style={{
        position:'relative',
        width: W*MM, height: H*MM,
        transform: `scale(${scale})`,
        filter: 'drop-shadow(0 30px 50px rgba(0,0,0,0.35))',
      }}>
        {/* Main body clipped at the tear line */}
        {(() => {
          const y = (POUCH.topSeal + 2) * MM;
          const cp = `polygon(0 ${y}px, 10% ${y-3}px, 25% ${y+2}px, 40% ${y-2}px, 55% ${y+3}px, 70% ${y-1}px, 85% ${y+2}px, 100% ${y-3}px, 100% 100%, 0 100%)`;

          );
        })()}

        {/* Torn-off top flap, floating above and slightly rotated */}
        <div style={{
          position:'absolute', top: `-${mm(8)}`, left: mm(3), right: mm(3),
          height: mm(POUCH.topSeal + 2),
          transform: 'rotate(-6deg)',

}

function BoxMockup({ scale = 0.85 }) {

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dielineOn": true,
  "safeOn": true,
  "hero": "wordmark",
  "accent": "mint"
}/*EDITMODE-END*/;

const ACCENTS = {
  mint:   { main: '#338DB8', dark: '#1F6F95', light: '#7FB7D4', tint: '#CFE3EE' }, // NORR brand blue (reference-matched)
  berry:  { main: '#7A2344', dark: '#52162E', light: '#C99AB0', tint: '#EBD6DE' },
  citrus: { main: '#C8A41C', dark: '#8C7208', light: '#E6D77E', tint: '#F3ECC2' },
};

function App() {
  const [tab, setTab] = React.useState(() => localStorage.getItem('norr_tab') || 'pack');
  const [tweaksEnabled, setTweaksEnabled] = React.useState(false);
  const [tw, setTw] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => { localStorage.setItem('norr_tab', tab); }, [tab]);

  React.useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setTweaksEnabled(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksEnabled(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const setKey = (k, v) => {
    setTw(prev => {
      const next = { ...prev, [k]: v };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      return next;
    });
  };

  // Apply accent swap to global norr palette at render time
  const a = ACCENTS[tw.accent] || ACCENTS.mint;
  React.useEffect(() => {
    window.norr.mint = a.main;
    window.norr.mintDk = a.dark;
    window.norr.mintLt = a.light;
    window.norr.mintTint = a.tint;
  }, [tw.accent]);

  // Force re-render when accent changes
  const [, tick] = React.useReducer(x=>x+1, 0);
  React.useEffect(() => { tick(); }, [tw.accent]);

  return (
    <div className="app">
      <div className="topbar">
        <div>
          <div className="sub">N°01 · ARCTIC MINT · NORR ENERGY GUM</div>
          <h1>Packaging system</h1>
          <div className="sub">Stand-up pouch 90×135 mm · Display box 240×140×90 mm</div>
        </div>
        <div className="tabs" role="tablist">
          <button className={tab==='pack'?'active':''} onClick={()=>setTab('pack')}>Pouch</button>
          <button className={tab==='box'?'active':''} onClick={()=>setTab('box')}>Display box</button>
          <button className={tab==='mockup'?'active':''} onClick={()=>setTab('mockup')}>Mockups</button>
          <button className={tab==='overview'?'active':''} onClick={()=>setTab('overview')}>Overview</button>
        </div>
      </div>

      {tab === 'overview' && <OverviewTab />}
      {tab === 'pack' && <PackTab tw={tw} />}
      {tab === 'box' && <BoxTab tw={tw} />}
      {tab === 'mockup' && <MockupTab />}

      {tweaksEnabled && (
        <div className="tweaks">
          <div className="title">Tweaks</div>
          <div className="group">
            <div className="label">Dieline overlay</div>
            <div className="toggles">
              <button className={tw.dielineOn ? 'on':''} onClick={()=>setKey('dielineOn', !tw.dielineOn)}>
                {tw.dielineOn ? 'ON' : 'OFF'}
              </button>
            </div>
          </div>
          <div className="group">
            <div className="label">Safe-area guides</div>
            <div className="toggles">
              <button className={tw.safeOn ? 'on':''} onClick={()=>setKey('safeOn', !tw.safeOn)}>
                {tw.safeOn ? 'ON' : 'OFF'}
              </button>
            </div>
          </div>
          <div className="group">
            <div className="label">Accent (flavor preview)</div>
            <div className="swatches">
              {Object.entries(ACCENTS).map(([k,v]) => (
                <button key={k} title={k}
                  className={tw.accent===k ? 'on' : ''}
                  style={{ background: v.main }}
                  onClick={()=>setKey('accent', k)} />
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function OverviewTab() {
  return (
    <div>
      <div className="notes">
        <h3>Design system — at a glance</h3>
        <ul>
          <li><b>Type:</b> Inter Tight (display, wide-weight editorial) + JetBrains Mono (technical callouts, nutrition, regulatory).</li>
          <li><b>Palette:</b> NORR brand blue #0099FF base on both faces, Ice #F2F3F0 reversed text, ink #0B0E10 only on dieline marks. Subtle topographic contours echo glacial terrain.</li>

          <div>

            <div className="meta">240 × 140 × 90 mm · 12-unit retail case · perforated tear lid</div>
          </div>
        </div>
        <div className="scroll-x">
          <div className="row">
            <div className="col">
              <div className="caption">Front — shelf billboard</div>
              <div className="panel-stage"><BoxFront showSafe={tw.safeOn} /></div>
            </div>
            <div className="col">
              <div className="caption">Back — bilingual information</div>
              <div className="panel-stage"><BoxBack showSafe={tw.safeOn} /></div>
            </div>
          </div>
        </div>
        <div className="scroll-x">
          <div className="row">
            <div className="col">
              <div className="caption">Side (×2) — saturated accent</div>
              <div className="panel-stage"><BoxSideShort showSafe={tw.safeOn} /></div>
            </div>
            <div className="col">
              <div className="caption">Top — tear-away lid</div>
              <div className="panel-stage"><BoxTop showSafe={tw.safeOn} /></div>
            </div>
          </div>
        </div>
      </div>

      <div className="section">
        <div className="section-header">
          <div>
            <h2>Flat dieline — print-ready</h2>
            <div className="meta">Single flat · matches supplied 240×140×90 dieline</div>
          </div>
        </div>
        <div className="dieline-legend-wrap">
          <DielineLegend showDieline={tw.dielineOn} onToggle={() => {
            window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { dielineOn: !tw.dielineOn } }, '*');
          }} />
        </div>
        <div className="scroll-x">
          <div className="panel-stage" style={{ padding: 24 }}>
            <BoxFlat showDieline={tw.dielineOn} showSafe={tw.safeOn} />
          </div>
        </div>
      </div>
    </div>
  );
}
